<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignBridge — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060912;
  --border:rgba(99,179,237,0.15);
  --accent:#63b3ed;
  --accent2:#7ee8a2;
  --text:#e8f0fe;
  --muted:#7a90b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  overflow:hidden;
}

/* BACKGROUND */

.bg-grid{
  position:fixed;
  inset:0;
  z-index:0;
  background-image:
  linear-gradient(rgba(99,179,237,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(99,179,237,.04) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gs 25s linear infinite;
}

@keyframes gs{
  to{background-position:0 60px;}
}

.orb{
  position:fixed;
  border-radius:50%;
  z-index:0;
  pointer-events:none;
}

.o1{
  width:550px;
  height:550px;
  top:-180px;
  left:-130px;
  background:
  radial-gradient(circle,
  rgba(99,179,237,.12) 0%,
  transparent 65%);
  animation:od 12s ease-in-out infinite;
}

.o2{
  width:420px;
  height:420px;
  bottom:-80px;
  right:-80px;
  background:
  radial-gradient(circle,
  rgba(126,232,162,.09) 0%,
  transparent 65%);
  animation:od 9s ease-in-out infinite reverse;
}

@keyframes od{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(22px,18px);}
}

/* LAYOUT */

.left{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
  position:relative;
  z-index:1;
  gap:24px;
}

.right{
  width:460px;
  flex-shrink:0;
  background:
  linear-gradient(
  160deg,
  rgba(13,20,38,.97),
  rgba(6,9,18,.99));
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:56px 48px;
  position:relative;
  z-index:1;
}

/* CHARACTER STAGE */

.scene{
  position:relative;
  width:340px;
  height:390px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.scene::before{
  content:'';
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  background:
  radial-gradient(circle,
  rgba(255,255,255,.04),
  transparent 70%);
  z-index:0;
}

/* JOYFUL BACKGROUND */

.happy-bg{
  position:absolute;
  inset:0;
  opacity:0;
  transition:all 1s ease;
  background:
  radial-gradient(circle at top left,#8a5cff55 0%,transparent 40%),
  radial-gradient(circle at top right,#ffd16655 0%,transparent 40%),
  radial-gradient(circle at bottom,#00d1b255 0%,transparent 40%);
  filter:blur(20px);
}

.happy-bg.active{
  opacity:1;
  transform:scale(1.1);
}

/* RINGS */

.ring{
  position:absolute;
  border-radius:50%;
  border:1.5px solid;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:rb 3.5s ease-in-out infinite;
}

.r1{
  width:250px;
  height:250px;
  border-color:rgba(99,179,237,.22);
}

.r2{
  width:306px;
  height:306px;
  border-color:rgba(99,179,237,.12);
  animation-delay:.8s;
}

.r3{
  width:360px;
  height:360px;
  border-color:rgba(126,232,162,.07);
  animation-delay:1.5s;
}

@keyframes rb{
  0%,100%{
    opacity:.35;
    transform:translate(-50%,-50%) scale(1);
  }
  50%{
    opacity:.85;
    transform:translate(-50%,-50%) scale(1.05);
  }
}

/* FLOATING ESL SYMBOLS */

.fs{
  position:absolute;
  font-size:22px;
  animation:fsf 4s ease-in-out infinite;
  filter:drop-shadow(0 0 8px rgba(99,179,237,.55));
}

.fs:nth-child(5){
  top:5%;
  left:2%;
}

.fs:nth-child(6){
  top:8%;
  right:3%;
}

.fs:nth-child(7){
  bottom:8%;
  left:3%;
}

.fs:nth-child(8){
  bottom:5%;
  right:2%;
}

@keyframes fsf{
  0%,100%{
    transform:translateY(0) rotate(0deg);
    opacity:.5;
  }
  50%{
    transform:translateY(-12px) rotate(8deg);
    opacity:1;
  }
}

/* STATUS CHIP */

.chip{
  position:absolute;
  bottom:-20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(8,14,30,.92);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 18px;
  font-size:12px;
  font-family:'Syne',sans-serif;
  letter-spacing:.06em;
  color:var(--muted);
  white-space:nowrap;
  transition:all .8s;
  backdrop-filter:blur(8px);
}

.chip.live{
  border-color:rgba(126,232,162,.5);
  color:var(--accent2);
  box-shadow:0 0 22px rgba(126,232,162,.25);
}

/* BRAND */

.brand-wrap{
  text-align:center;
}

.brand{
  font-family:'Syne',sans-serif;
  font-size:44px;
  font-weight:800;
  background:
  linear-gradient(
  135deg,
  var(--accent),
  var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-.02em;
  line-height:1;
}

.tagline{
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:.1em;
  text-transform:uppercase;
  font-family:'Syne',sans-serif;
}

/* FORM */

.fhd{
  margin-bottom:34px;
}

.ftitle{
  font-family:'Syne',sans-serif;
  font-size:27px;
  font-weight:700;
  color:var(--text);
  margin-bottom:6px;
}

.fsub{
  color:var(--muted);
  font-size:13px;
}

.field{
  margin-bottom:18px;
  position:relative;
}

.field label{
  display:block;
  font-size:11px;
  font-family:'Syne',sans-serif;
  letter-spacing:.09em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:7px;
}

.field input{
  width:100%;
  background:rgba(99,179,237,.05);
  border:1px solid var(--border);
  border-radius:10px;
  padding:13px 42px 13px 16px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  color:var(--text);
  outline:none;
  transition:all .3s;
}

.field input::placeholder{
  color:rgba(122,144,184,.45);
}

.field input:focus{
  border-color:var(--accent);
  background:rgba(99,179,237,.08);
  box-shadow:0 0 0 3px rgba(99,179,237,.10);
}

.ficon{
  position:absolute;
  right:14px;
  top:38px;
  font-size:17px;
  color:var(--muted);
}

.err{
  background:rgba(229,62,62,.10);
  border:1px solid rgba(229,62,62,.30);
  border-radius:8px;
  padding:10px 14px;
  font-size:13px;
  color:#fc8181;
  margin-bottom:16px;
  display:none;
}

/* BUTTONS */

.btn-in{
  width:100%;
  padding:14px;
  margin-top:6px;
  background:
  linear-gradient(
  135deg,
  #1a5a9a,
  #1a6040);
  border:none;
  border-radius:10px;
  font-family:'Syne',sans-serif;
  font-size:15px;
  font-weight:700;
  color:white;
  cursor:pointer;
  letter-spacing:.05em;
  transition:all .3s;
  position:relative;
  overflow:hidden;
}

.btn-in::before{
  content:'';
  position:absolute;
  inset:0;
  background:
  linear-gradient(
  135deg,
  var(--accent),
  var(--accent2));
  opacity:0;
  transition:opacity .3s;
}

.btn-in:hover::before{
  opacity:1;
}

.btn-in:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 28px rgba(99,179,237,.28);
}

.btn-in span{
  position:relative;
  z-index:1;
}

.divider{
  display:flex;
  align-items:center;
  gap:10px;
  margin:22px 0;
  color:var(--muted);
  font-size:12px;
}

.divider::before,
.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

.btn-reg{
  width:100%;
  padding:13px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:10px;
  font-family:'Syne',sans-serif;
  font-size:14px;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  transition:all .3s;
  letter-spacing:.04em;
}

.btn-reg:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:rgba(99,179,237,.05);
}

/* ANIMATION */

.left>*{
  animation:fu .8s ease both;
}

.right>*{
  animation:fu .8s ease both;
}

@keyframes fu{
  from{
    opacity:0;
    transform:translateY(22px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.pt{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:999;
  animation:pf 1s ease-out forwards;
}

@keyframes pf{
  0%{
    opacity:1;
    transform:translate(0,0) scale(1);
  }
  100%{
    opacity:0;
    transform:var(--d) scale(0);
  }
}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}

/* CHARACTER */

#tear{
  transition:opacity .6s;
}

.bounce{
  animation:bav 0.6s ease;
}

@keyframes bav{
  0%{transform:translateY(0);}
  30%{transform:translateY(-18px);}
  60%{transform:translateY(-6px);}
  80%{transform:translateY(-12px);}
  100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div class="bg-grid"></div>
<div class="orb o1"></div>
<div class="orb o2"></div>

<!-- LEFT SIDE -->

<div class="left">

  <div class="scene">

    <div class="happy-bg" id="happyBg"></div>

    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>

    <span class="fs">🤟</span>
    <span class="fs">🖐️</span>
    <span class="fs">✌️</span>
    <span class="fs">👐</span>

    <!-- CHARACTER -->

    <svg id="av"
         width="270"
         height="350"
         viewBox="0 0 270 350"
         xmlns="http://www.w3.org/2000/svg"
         style="position:relative;z-index:2;transition:transform .5s ease;">

      <defs>

        <radialGradient id="skin" cx="45%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#FFD8B4"/>
          <stop offset="100%" stop-color="#E8A16B"/>
        </radialGradient>

        <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7a4320"/>
          <stop offset="100%" stop-color="#3d1d0d"/>
        </linearGradient>

        <linearGradient id="hoodie" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0f2c77"/>
          <stop offset="100%" stop-color="#08122f"/>
        </linearGradient>

      </defs>

      <!-- BODY -->

      <path d="
      M50 255
      Q68 210 135 210
      Q202 210 210 255
      L235 350
      L35 340 Z"
      fill="url(#hoodie)"/>

      <!-- NECK -->

      <rect x="117"
            y="182"
            width="36"
            height="38"
            rx="12"
            fill="url(#skin)"/>

      <!-- FACE -->

      <ellipse cx="135"
               cy="122"
               rx="70"
               ry="84"
               fill="url(#skin)"/>

          <!-- WAVY BROWN HAIR -->

      <path d="

      M58 118

      Q62 40 135 28

      Q208 40 212 118

      Q195 88 170 80

      Q150 74 135 74

      Q120 74 100 80

      Q75 88 58 118 Z"

      fill="url(#hair)"/>

      <!-- WAVES -->

      <path d="

      M60 118

      Q48 150 65 215

      Q75 195 82 175

      Q72 160 82 145

      Q90 130 78 118 Z"

      fill="#512710"/>
      
      <!-- HEADPHONES -->

      <path d="
      M78 70
      Q130 18 182 70"
      stroke="#1b233a"
      stroke-width="12"
      fill="none"
      stroke-linecap="round"/>

      <ellipse cx="66"
               cy="125"
               rx="16"
               ry="26"
               fill="#101827"/>

      <ellipse cx="194"
               cy="125"
               rx="16"
               ry="26"
               fill="#101827"/>

      <ellipse cx="66"
               cy="125"
               rx="9"
               ry="17"
               fill="#63b3ed"/>

      <ellipse cx="194"
               cy="125"
               rx="9"
               ry="17"
               fill="#63b3ed"/>

      <!-- EYES -->

      <ellipse cx="105"
               cy="125"
               rx="14"
               ry="13"
               fill="white"/>

      <ellipse cx="155"
               cy="125"
               rx="14"
               ry="13"
               fill="white"/>

      <circle cx="105"
              cy="127"
              r="7"
              fill="#3f7bd9"/>

      <circle cx="155"
              cy="127"
              r="7"
              fill="#3f7bd9"/>

      <circle cx="105"
              cy="127"
              r="3.5"
              fill="#111"/>

      <circle cx="155"
              cy="127"
              r="3.5"
              fill="#111"/>

      <circle cx="108"
              cy="124"
              r="2"
              fill="white"/>

      <circle cx="158"
              cy="124"
              r="2"
              fill="white"/>

      <!-- EYEBROWS -->

      <path id="browL"
            d="M92 104 Q105 98 118 104"
            stroke="#3d2350"
            stroke-width="4"
            fill="none"
            stroke-linecap="round"/>

      <path id="browR"
            d="M142 104 Q155 98 168 104"
            stroke="#3d2350"
            stroke-width="4"
            fill="none"
            stroke-linecap="round"/>

      <!-- NOSE -->

      <path d="
      M128 136
      Q124 148 130 153
      Q136 148 132 136"
      stroke="#cb8654"
      stroke-width="2"
      fill="none"
      stroke-linecap="round"/>

      <!-- MOUTH -->

      <path id="mp"
            d="M112 172 Q130 164 148 172"
            stroke="#b34747"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"/>

      <!-- TEAR -->

      <ellipse id="tear"
               cx="92"
               cy="146"
               rx="4"
               ry="7"
               fill="#8fd3ff"
               opacity=".85"/>

      <!-- LEFT ARM -->

      <g id="hL"
         style="transition:transform .8s cubic-bezier(.34,1.56,.64,1);">

        <path d="
        M58 255
        Q42 278 52 312"
        stroke="#E8A16B"
        stroke-width="18"
        fill="none"
        stroke-linecap="round"/>

        <circle cx="54"
                cy="315"
                r="16"
                fill="url(#skin)"/>

      </g>

      <!-- RIGHT ARM -->

      <g id="hR"
         style="transition:transform .8s cubic-bezier(.34,1.56,.64,1);">

        <path d="
        M202 248
        Q236 215 228 150"
        stroke="#E8A16B"
        stroke-width="18"
        fill="none"
        stroke-linecap="round"/>

        <!-- PALM -->

        <circle cx="228"
                cy="138"
                r="18"
                fill="url(#skin)"/>

        <!-- ESL SIGN -->

        <rect x="217"
              y="97"
              width="10"
              height="34"
              rx="5"
              fill="url(#skin)"/>

        <rect x="234"
              y="100"
              width="10"
              height="30"
              rx="5"
              fill="url(#skin)"/>

        <ellipse cx="246"
                 cy="144"
                 rx="8"
                 ry="13"
                 fill="url(#skin)"
                 transform="rotate(30 246 144)"/>

      </g>

      <!-- VISUAL SOUND WAVES -->

      <g id="sw"
         opacity="0"
         style="transition:opacity 1s ease;">

        <path d="
        M42 116
        Q22 128 42 140"
        stroke="#7ee8a2"
        stroke-width="3"
        fill="none"
        stroke-linecap="round">

          <animate attributeName="opacity"
                   values=".2;1;.2"
                   dur="1.3s"
                   repeatCount="indefinite"/>

        </path>

        <path d="
        M28 106
        Q0 128 28 150"
        stroke="#7ee8a2"
        stroke-width="2"
        fill="none"
        stroke-linecap="round">

          <animate attributeName="opacity"
                   values=".1;.6;.1"
                   dur="1.3s"
                   repeatCount="indefinite"/>

        </path>

      </g>

      <!-- JOY ELEMENTS -->

      <g id="stars"
         opacity="0"
         style="transition:opacity .5s ease;">

        <text x="18" y="88" font-size="20">✨</text>
        <text x="210" y="92" font-size="18">⭐</text>
        <text x="16" y="210" font-size="16">💫</text>
        <text x="220" y="230" font-size="18">✨</text>

      </g>

    </svg>

    <div class="chip" id="chip">
      😢 Waiting for connection...
    </div>

  </div>

  <div class="brand-wrap">
    <div class="brand">SignBridge</div>
    <div class="tagline">
      Breaking barriers · Real-time ESL Communication
    </div>
  </div>

</div>

<!-- RIGHT SIDE -->

<div class="right">

  <div class="fhd">
    <div class="ftitle">Welcome back 👋</div>
    <div class="fsub">
      Sign in to join your meeting
    </div>
  </div>

  <div class="err" id="err"></div>

  <div class="field">
    <label>Username</label>

    <input type="text"
           id="lu"
           placeholder="your_username"
           autocomplete="username"
           oninput="onType()"
           onkeydown="if(event.key==='Enter')doLogin()">

    <span class="ficon">👤</span>
  </div>

  <div class="field">

    <label>Password</label>

    <input type="password"
           id="lp"
           placeholder="••••••••"
           autocomplete="current-password"
           oninput="onType()"
           onkeydown="if(event.key==='Enter')doLogin()">

    <span class="ficon">🔒</span>

  </div>

  <button class="btn-in" onclick="doLogin()">
    <span>Sign In →</span>
  </button>

  <div class="divider">or</div>

  <button class="btn-reg"
          onclick="location.href='register.html'">
    Create New Account
  </button>

</div>

<script>

function onType(){

  const m=document.getElementById('mp');

  if(!m) return;

  m.setAttribute(
  'd',
  'M112 170 Q130 166 148 170');

  clearTimeout(window._mt);

  window._mt=setTimeout(()=>{

    m.setAttribute(
    'd',
    'M112 172 Q130 164 148 172');

  },800);

}

function doLogin(){

  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;

  const eb=document.getElementById('err');

  eb.style.display='none';

  if(!u||!p){

    eb.innerText='Please fill in all fields.';
    eb.style.display='block';
    return;

  }

  const users=JSON.parse(
  localStorage.getItem('signbridge_users')||'{}');

  if(!users[u]||users[u].password!==p){

    eb.innerText='Invalid username or password.';
    eb.style.display='block';

    document.querySelector('.right').style.animation='shake .4s ease';

    setTimeout(()=>{
      document.querySelector('.right').style.animation='';
    },500);

    sadReaction();

    return;
  }

  localStorage.setItem(
  'signbridge_current',
  JSON.stringify({
    username:u,
    displayName:users[u].displayName||u
  }));

  happyReaction();

  burst();

  setTimeout(()=>{

    location.href='index.html?user='+
    encodeURIComponent(
    users[u].displayName||u
    );

  },2200);

}

function sadReaction(){

  const av=document.getElementById('av');

  av.style.transform='translateX(-6px)';

  setTimeout(()=>{
    av.style.transform='translateX(0)';
  },400);

}

function happyReaction(){

  /* remove tear */

  document.getElementById('tear').style.opacity='0';

  /* visual sound */

  document.getElementById('sw').style.opacity='1';

  /* background transformation */

  document.getElementById('happyBg')
  .classList.add('active');

  /* chip */

  const chip=document.getElementById('chip');

  chip.classList.add('live');

  chip.innerText=
  '🤟 Welcome! ♥️✨ أهلاً وسهلاً';

  /* eyebrows */

  document.getElementById('browL')
  .setAttribute(
  'd',
  'M92 106 Q105 98 118 102');

  document.getElementById('browR')
  .setAttribute(
  'd',
  'M142 102 Q155 98 168 106');

  /* smile */

  document.getElementById('mp')
  .setAttribute(
  'd',
  'M108 168 Q130 194 152 168');

  /* arms */

  document.getElementById('hL')
  .style.transform=
  'translateY(-14px) rotate(-8deg)';

  document.getElementById('hR')
  .style.transform=
  'translateY(-24px) rotate(12deg)';

  /* stars */

  document.getElementById('stars')
  .style.opacity='1';

  /* bounce */

  const av=document.getElementById('av');

  av.classList.add('bounce');

  setTimeout(()=>{
    av.classList.remove('bounce');
  },700);

}

function burst(){

  [
    '#63b3ed',
    '#7ee8a2',
    '#f6e05e',
    '#fc8181',
    '#b794f4',
    '#FFA07A'
  ].forEach(c=>{

    for(let i=0;i<6;i++){

      const d=document.createElement('div');

      d.className='pt';

      d.style.cssText=`
      width:${6+Math.random()*6}px;
      height:${6+Math.random()*6}px;
      background:${c};
      left:${15+Math.random()*70}vw;
      top:${15+Math.random()*70}vh;
      --d:translate(
      ${(Math.random()-.5)*400}px,
      ${(Math.random()-.5)*400}px);
      animation-duration:${.5+Math.random()*1.1}s;`;

      document.body.appendChild(d);

      setTimeout(()=>d.remove(),1700);

    }

  });

}

const s=document.createElement('style');

s.textContent=`
@keyframes shake{
0%,100%{transform:translateX(0)}
20%{transform:translateX(-9px)}
40%{transform:translateX(9px)}
60%{transform:translateX(-5px)}
80%{transform:translateX(5px)}
}`;

document.head.appendChild(s);

</script>
